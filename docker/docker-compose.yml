version: '3.8'

services:
  # ---- 应用服务 (NestJS API + 前端 SPA 合并) ----
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: homehub
    environment:
      NODE_ENV: production
      DB_TYPE: postgres
      DATABASE_URL: postgres://homehub:${DB_PASSWORD:-homehub-dev}@homehub-db:5432/homehub
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-in-production}
      PORT: 3000
      CLIENT_DIST_PATH: /app/client/dist
    ports:
      - "${PORT:-80}:3000"
    volumes:
      - uploads_data:/app/server/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ---- Database (PostgreSQL) ----
  postgres:
    image: postgres:16-alpine
    container_name: homehub-db
    environment:
      POSTGRES_DB: homehub
      POSTGRES_USER: homehub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-homehub-dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Cache (Redis) ----
  redis:
    image: redis:7-alpine
    container_name: homehub-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data: